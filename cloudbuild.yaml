steps:
  # Build the container image from deployment/Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/proofpoint-simulator/tap-simulator:latest'
      - '-f'
      - 'deployment/Dockerfile'
      - '.'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/proofpoint-simulator/tap-simulator:latest'

substitutions:
  _REGION: europe-west1
